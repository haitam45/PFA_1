# ====================================================================
# CONFIGURATION DU SERVEUR ET DE LA BASE DE DONNEES SPRING BOOT
# placement recommandé : src/main/resources/application.properties
# ====================================================================

# Port du serveur de l'API (different de React 3000 pour éviter les conflits)
server.port=8080

# 1. Connexion à la base de données MySQL / PostgreSQL
# Remplacez "gestion_parc" par le nom de votre base locale
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_parc?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=votre_mot_de_passe

# Driver pour MySQL (ou org.postgresql.Driver si vous êtes sous PostgreSQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Gestion et initialisation des schémas SQL directement depuis le code
# "update" demande à Hibernate de mettre à jour d'abord les tables définies par les classes Java (@Entity)
spring.jpa.hibernate.ddl-auto=update

# Indiquer s'il faut exécuter les commandes personnalisées de schema.sql et data.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# 3. Paramètres Hibernate et logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Formats de sérialisation JSON
spring.jackson.serialization.write-dates-as-timestamps=false
